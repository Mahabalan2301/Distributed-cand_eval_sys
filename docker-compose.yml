version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: zetheta_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zetheta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:   # ✅ NOW correctly inside services
    image: redis:7
    container_name: zetheta_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: