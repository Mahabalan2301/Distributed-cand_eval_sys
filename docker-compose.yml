services:
  postgres:
    image: postgres:15
    container_name: zetheta_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zetheta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zetheta_redis
    ports:
      - "6379:6379"

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/zetheta?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecret
      - PORT=5000
    depends_on:
      - postgres
      - redis

  evaluation-worker:
    build:
      context: ./services/evaluation-worker
      dockerfile: Dockerfile
    container_name: evaluation_worker
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/zetheta?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile

    container_name: api_gateway
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5000
    depends_on:
      - auth-service

volumes:
  pgdata: